name: "n8n_curso"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # opcional (n8n genera una de forma automatica, debe recuperarse para volver a crear contenedor)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}

    volumes:
      - n8n_data:/home/node/.n8n

    networks:
      - n8n_red

  pg:
    image: postgres:latest
    container_name: pg
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - n8n_red

  qd:
    image: qdrant/qdrant:latest
    container_name: qd
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qd_data:/qdrant/storage
    networks:
      - n8n_red

volumes:
  n8n_data:
    name: n8n_data
  pg_data:
    name: pg_data
  qd_data:
    name: qd_data

networks:
  n8n_red:
    name: n8n_red
    driver: bridge
